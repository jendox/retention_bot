global:
  scrape_interval: 15s

scrape_configs:
  - job_name: retention_bot_bot
    metrics_path: /metrics
    static_configs:
      - targets: ["127.0.0.1:8000"]

  - job_name: retention_bot_reminders
    metrics_path: /metrics
    static_configs:
      - targets: ["127.0.0.1:8001"]

  - job_name: retention_bot_payments
    metrics_path: /metrics
    static_configs:
      - targets: ["127.0.0.1:8002"]

