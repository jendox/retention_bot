server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Discover running containers via Docker API and read json-file logs from the host filesystem.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      # Keep stable labels for filtering in Grafana.
      - source_labels: ["__meta_docker_container_name"]
        target_label: container
      - source_labels: ["__meta_docker_container_id"]
        target_label: container_id
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: compose_project
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: compose_service

      # Build the path to Docker's json-file log.
      - source_labels: ["__meta_docker_container_id"]
        target_label: __path__
        replacement: /var/lib/docker/containers/$1/$1-json.log

    pipeline_stages:
      # Docker json-file format: {"log":"...","stream":"stdout","time":"..."}
      - json:
          expressions:
            log: log
            stream: stream
            time: time
      - labels:
          stream:
      - timestamp:
          source: time
          format: RFC3339Nano
      # Our app logs are JSON strings inside the "log" field. Parse them for convenient fields.
      - json:
          source: log
          expressions:
            level: level
            logger: logger
            event: event
            service: service
            env: env
            trace_id: trace_id
            update_id: update_id
            telegram_id: telegram_id
            handler: handler
            fsm_state: fsm_state
      - labels:
          level:
          event:
          service:
          env:

